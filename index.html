<style>
body {
  margin: 0;
  height: 100vh;
  background-color: #E74B2E;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

.botao {
  background: white;
  color: #E74B2E;
  padding: 20px 60px;
  font-size: 26px;
  border-radius: 10px;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<a href="#" id="btnShopee" class="botao">
Abrir a Shopee
</a>

<script>
(function(){

// ============================
// 🔥 PARÂMETROS
// ============================

const params = new URLSearchParams(window.location.search);

let LINK_SHOPEE = null;
let UC = null;

const raw = params.get("dest");

if (raw && raw.includes("|||")) {
  const partes = raw.split("|||");
  LINK_SHOPEE = partes[0];
  UC = partes[1];
}

if (!LINK_SHOPEE) {
  LINK_SHOPEE = params.get("dest");
  UC = params.get("uc");
}

if (!LINK_SHOPEE || !UC) {
  alert("Erro: link ou UC não informado.");
  throw new Error("Parâmetros inválidos");
}

// ============================
// ⏱️ TEMPO
// ============================

let tempo=0, tempoLabel="";
let disparouS30=false;

let tempoS0a1=false;
let tempoS1a2=false;

let evento01=false;
let evento02=false;

let clickRight=false;

function tempoLoop(){
  tempo++;

  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo;
    fbq('trackCustom',"Tempo_"+tempoLabel);
  }else if(!disparouS30){
    tempoLabel="S30";
    fbq('trackCustom',"Tempo_S30");
    disparouS30=true;
  }

  if(tempoLabel==="S0a1"){
    tempoS0a1=true;
    checkEventos();
  }

  if(tempoLabel==="S1a2"){
    tempoS1a2=true;
    checkEventos();
  }
}

tempoLoop();
setInterval(tempoLoop,1000);

// ============================
// 🎯 EVENTOS AVANÇADOS
// ============================

function checkEventos(){

  if(clickRight && tempoS0a1 && !evento02){
    fbq('trackCustom','EVENTO02');
    evento02=true;
  }

  if(clickRight && tempoS1a2 && !evento01){
    fbq('trackCustom','EVENTO01');
    evento01=true;
  }
}

// ============================
// 🖱️ CLIQUE
// ============================

document.getElementById("btnShopee").addEventListener("click", function(e){
  e.preventDefault();

  const btn = this;
  btn.innerText = "Redirecionando...";

  const rect = btn.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const largura = rect.width;

  let pos;

  const inicioCentro = largura * 0.45;
  const fimCentro = largura * 0.55;

  if (x < inicioCentro) pos = "Left";
  else if (x > fimCentro) pos = "Right";
  else pos = "Center";

  // ============================
  // 📊 EVENTOS META
  // ============================

  fbq('trackCustom', 'ClickShopee', {
    position: pos,
    uc: UC
  });

  if (pos === "Left") fbq('trackCustom', 'ClickShopee_Left');
  else if (pos === "Center") fbq('trackCustom', 'ClickShopee_Center');
  else fbq('trackCustom', 'ClickShopee_Right');

  if(pos === "Right"){
    clickRight = true;
    checkEventos();
  }

  fbq('track', 'InitiateCheckout');

  // ============================
  // 🔥 UC COM TEMPO EMBUTIDO
  // ============================

  let tempoFinal = tempoLabel || "S0";

  let finalUC = (UC + tempoFinal)
    .replace(/[^a-zA-Z0-9]/g,"");

  // ============================
  // 🔗 REDIRECIONAMENTO
  // ============================

  const link = encodeURIComponent(LINK_SHOPEE);

  const finalURL = `https://shopee-utm-tracker.onrender.com/?link=${link}&pos=${pos}&uc=${finalUC}`;

  setTimeout(() => {
    window.location.href = finalURL;
  }, 200);

});

})();
</script>

</body>
</html>
